naftiko: 1.0.0-alpha2
info:
  label: Bloomberg Buyside Enterprise Solutions Bloomberg Analytics API — Yield Curves
  description: 'Bloomberg Buyside Enterprise Solutions Bloomberg Analytics API — Yield Curves. 2 operations. Lead operation:
    Bloomberg Buyside Enterprise Solutions List available yield curves. Self-contained Naftiko capability covering one Bloomberg
    Buyside Enterprise Solutions business surface.'
  tags:
  - Bloomberg Buyside Enterprise Solutions
  - Yield Curves
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    BLOOMBERG_BUYSIDE_ENTERPRISE_SOLUTIONS_API_KEY: BLOOMBERG_BUYSIDE_ENTERPRISE_SOLUTIONS_API_KEY
capability:
  consumes:
  - type: http
    namespace: bloomberg-buyside-analytics-yield-curves
    baseUri: https://api.bloomberg.com/analytics
    description: Bloomberg Buyside Enterprise Solutions Bloomberg Analytics API — Yield Curves business capability. Self-contained,
      no shared references.
    resources:
    - name: v1-yield-curves
      path: /v1/yield-curves
      operations:
      - name: listyieldcurves
        method: GET
        description: Bloomberg Buyside Enterprise Solutions List available yield curves
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: currency
          in: query
          type: string
          description: Filter by currency (ISO 4217)
        - name: type
          in: query
          type: string
          description: Filter by curve type
        - name: limit
          in: query
          type: integer
    - name: v1-yield-curves-curveId
      path: /v1/yield-curves/{curveId}
      operations:
      - name: getyieldcurve
        method: GET
        description: Bloomberg Buyside Enterprise Solutions Get yield curve data
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: curveId
          in: path
          type: string
          description: Yield curve identifier
          required: true
        - name: asOfDate
          in: query
          type: string
          description: Curve date (defaults to most recent)
    authentication:
      type: bearer
      token: '{{env.BLOOMBERG_BUYSIDE_ENTERPRISE_SOLUTIONS_API_KEY}}'
  exposes:
  - type: rest
    namespace: bloomberg-buyside-analytics-yield-curves-rest
    port: 8080
    description: REST adapter for Bloomberg Buyside Enterprise Solutions Bloomberg Analytics API — Yield Curves. One Spectral-compliant
      resource per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/v1/yield-curves
      name: v1-yield-curves
      description: REST surface for v1-yield-curves.
      operations:
      - method: GET
        name: listyieldcurves
        description: Bloomberg Buyside Enterprise Solutions List available yield curves
        call: bloomberg-buyside-analytics-yield-curves.listyieldcurves
        with:
          currency: rest.currency
          type: rest.type
          limit: rest.limit
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/v1/yield-curves/{curveid}
      name: v1-yield-curves-curveid
      description: REST surface for v1-yield-curves-curveId.
      operations:
      - method: GET
        name: getyieldcurve
        description: Bloomberg Buyside Enterprise Solutions Get yield curve data
        call: bloomberg-buyside-analytics-yield-curves.getyieldcurve
        with:
          curveId: rest.curveId
          asOfDate: rest.asOfDate
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: bloomberg-buyside-analytics-yield-curves-mcp
    port: 9090
    transport: http
    description: MCP adapter for Bloomberg Buyside Enterprise Solutions Bloomberg Analytics API — Yield Curves. One tool per
      consumed operation, routed inline through this capability's consumes block.
    tools:
    - name: bloomberg-buyside-enterprise-solutions-list
      description: Bloomberg Buyside Enterprise Solutions List available yield curves
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: bloomberg-buyside-analytics-yield-curves.listyieldcurves
      with:
        currency: tools.currency
        type: tools.type
        limit: tools.limit
      outputParameters:
      - type: object
        mapping: $.
    - name: bloomberg-buyside-enterprise-solutions-get
      description: Bloomberg Buyside Enterprise Solutions Get yield curve data
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: bloomberg-buyside-analytics-yield-curves.getyieldcurve
      with:
        curveId: tools.curveId
        asOfDate: tools.asOfDate
      outputParameters:
      - type: object
        mapping: $.
