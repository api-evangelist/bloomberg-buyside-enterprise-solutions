naftiko: 1.0.0-alpha2
info:
  label: Bloomberg Buyside Enterprise Solutions Bloomberg Data API — Reference Data
  description: 'Bloomberg Buyside Enterprise Solutions Bloomberg Data API — Reference Data. 2 operations. Lead operation:
    Bloomberg Buyside Enterprise Solutions Get reference data for securities. Self-contained Naftiko capability covering one
    Bloomberg Buyside Enterprise Solutions business surface.'
  tags:
  - Bloomberg Buyside Enterprise Solutions
  - Reference Data
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    BLOOMBERG_BUYSIDE_ENTERPRISE_SOLUTIONS_API_KEY: BLOOMBERG_BUYSIDE_ENTERPRISE_SOLUTIONS_API_KEY
capability:
  consumes:
  - type: http
    namespace: bloomberg-buyside-data-reference-data
    baseUri: https://api.bloomberg.com
    description: Bloomberg Buyside Enterprise Solutions Bloomberg Data API — Reference Data business capability. Self-contained,
      no shared references.
    resources:
    - name: data-v1-reference
      path: /data/v1/reference
      operations:
      - name: getreferencedata
        method: POST
        description: Bloomberg Buyside Enterprise Solutions Get reference data for securities
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: data-v1-securities-search
      path: /data/v1/securities/search
      operations:
      - name: searchsecurities
        method: GET
        description: Bloomberg Buyside Enterprise Solutions Search for securities
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: query
          in: query
          type: string
          description: Security name, ticker, or identifier to search for
          required: true
        - name: assetClass
          in: query
          type: string
          description: Filter by asset class
        - name: limit
          in: query
          type: integer
          description: Maximum number of results
        - name: offset
          in: query
          type: integer
          description: Number of results to skip
    authentication:
      type: bearer
      token: '{{env.BLOOMBERG_BUYSIDE_ENTERPRISE_SOLUTIONS_API_KEY}}'
  exposes:
  - type: rest
    namespace: bloomberg-buyside-data-reference-data-rest
    port: 8080
    description: REST adapter for Bloomberg Buyside Enterprise Solutions Bloomberg Data API — Reference Data. One Spectral-compliant
      resource per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/data/v1/reference
      name: data-v1-reference
      description: REST surface for data-v1-reference.
      operations:
      - method: POST
        name: getreferencedata
        description: Bloomberg Buyside Enterprise Solutions Get reference data for securities
        call: bloomberg-buyside-data-reference-data.getreferencedata
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/data/v1/securities/search
      name: data-v1-securities-search
      description: REST surface for data-v1-securities-search.
      operations:
      - method: GET
        name: searchsecurities
        description: Bloomberg Buyside Enterprise Solutions Search for securities
        call: bloomberg-buyside-data-reference-data.searchsecurities
        with:
          query: rest.query
          assetClass: rest.assetClass
          limit: rest.limit
          offset: rest.offset
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: bloomberg-buyside-data-reference-data-mcp
    port: 9090
    transport: http
    description: MCP adapter for Bloomberg Buyside Enterprise Solutions Bloomberg Data API — Reference Data. One tool per
      consumed operation, routed inline through this capability's consumes block.
    tools:
    - name: bloomberg-buyside-enterprise-solutions-get
      description: Bloomberg Buyside Enterprise Solutions Get reference data for securities
      hints:
        readOnly: true
        destructive: false
        idempotent: false
      call: bloomberg-buyside-data-reference-data.getreferencedata
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: bloomberg-buyside-enterprise-solutions-search
      description: Bloomberg Buyside Enterprise Solutions Search for securities
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: bloomberg-buyside-data-reference-data.searchsecurities
      with:
        query: tools.query
        assetClass: tools.assetClass
        limit: tools.limit
        offset: tools.offset
      outputParameters:
      - type: object
        mapping: $.
