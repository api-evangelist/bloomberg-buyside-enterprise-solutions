        method: GET
        description: Bloomberg Buyside Enterprise Solutions List portfolios
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: type
          in: query
          type: string
          description: Filter by portfolio type
        - name: status
          in: query
          type: string
          description: Filter by portfolio status
        - name: manager
          in: query
          type: string
          description: Filter by portfolio manager identifier
        - name: limit
          in: query
          type: integer
          description: Maximum number of results
        - name: offset
          in: query
          type: integer
          description: Number of results to skip
