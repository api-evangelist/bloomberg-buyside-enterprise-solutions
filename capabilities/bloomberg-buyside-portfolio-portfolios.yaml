    description: REST adapter for Bloomberg Buyside Enterprise Solutions Bloomberg Portfolio API — Portfolios. One Spectral-compliant
      resource per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/v1/portfolios
      name: v1-portfolios
      description: REST surface for v1-portfolios.
      operations:
