naftiko: 1.0.0-alpha2
info:
  label: Bloomberg Buyside Enterprise Solutions Bloomberg Analytics API — Pricing
  description: 'Bloomberg Buyside Enterprise Solutions Bloomberg Analytics API — Pricing. 1 operations. Lead operation: Bloomberg
    Buyside Enterprise Solutions Evaluate security prices. Self-contained Naftiko capability covering one Bloomberg Buyside
    Enterprise Solutions business surface.'
  tags:
  - Bloomberg Buyside Enterprise Solutions
  - Pricing
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    BLOOMBERG_BUYSIDE_ENTERPRISE_SOLUTIONS_API_KEY: BLOOMBERG_BUYSIDE_ENTERPRISE_SOLUTIONS_API_KEY
capability:
  consumes:
  - type: http
    namespace: bloomberg-buyside-analytics-pricing
    baseUri: https://api.bloomberg.com/analytics
    description: Bloomberg Buyside Enterprise Solutions Bloomberg Analytics API — Pricing business capability. Self-contained,
      no shared references.
    resources:
    - name: v1-pricing-evaluate
      path: /v1/pricing/evaluate
      operations:
      - name: evaluatesecurities
        method: POST
        description: Bloomberg Buyside Enterprise Solutions Evaluate security prices
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.BLOOMBERG_BUYSIDE_ENTERPRISE_SOLUTIONS_API_KEY}}'
  exposes:
  - type: rest
    namespace: bloomberg-buyside-analytics-pricing-rest
    port: 8080
    description: REST adapter for Bloomberg Buyside Enterprise Solutions Bloomberg Analytics API — Pricing. One Spectral-compliant
      resource per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/v1/pricing/evaluate
      name: v1-pricing-evaluate
      description: REST surface for v1-pricing-evaluate.
      operations:
      - method: POST
        name: evaluatesecurities
        description: Bloomberg Buyside Enterprise Solutions Evaluate security prices
        call: bloomberg-buyside-analytics-pricing.evaluatesecurities
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: bloomberg-buyside-analytics-pricing-mcp
    port: 9090
    transport: http
    description: MCP adapter for Bloomberg Buyside Enterprise Solutions Bloomberg Analytics API — Pricing. One tool per consumed
      operation, routed inline through this capability's consumes block.
    tools:
    - name: bloomberg-buyside-enterprise-solutions-evaluate
      description: Bloomberg Buyside Enterprise Solutions Evaluate security prices
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: bloomberg-buyside-analytics-pricing.evaluatesecurities
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
