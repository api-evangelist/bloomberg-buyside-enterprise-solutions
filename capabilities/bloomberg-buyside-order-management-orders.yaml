        - name: result
          type: object
          value: $.
        inputParameters:
        - name: status
          in: query
          type: string
          description: Filter by order status
        - name: side
          in: query
          type: string
          description: Filter by order side
        - name: security
          in: query
          type: string
          description: Filter by security identifier
        - name: portfolioId
          in: query
          type: string
          description: Filter by portfolio
        - name: startDate
          in: query
          type: string
          description: Filter orders created on or after this date
        - name: endDate
          in: query
          type: string
          description: Filter orders created on or before this date
        - name: limit
          in: query
          type: integer
        - name: offset
