naftiko: 1.0.0-alpha2
info:
  label: Bloomberg Buyside Enterprise Solutions Bloomberg Analytics API — Scenario Analysis
  description: 'Bloomberg Buyside Enterprise Solutions Bloomberg Analytics API — Scenario Analysis. 1 operations. Lead operation:
    Bloomberg Buyside Enterprise Solutions Run scenario analysis. Self-contained Naftiko capability covering one Bloomberg
    Buyside Enterprise Solutions business surface.'
  tags:
  - Bloomberg Buyside Enterprise Solutions
  - Scenario Analysis
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    BLOOMBERG_BUYSIDE_ENTERPRISE_SOLUTIONS_API_KEY: BLOOMBERG_BUYSIDE_ENTERPRISE_SOLUTIONS_API_KEY
capability:
  consumes:
  - type: http
    namespace: bloomberg-buyside-analytics-scenario-analysis
    baseUri: https://api.bloomberg.com/analytics
    description: Bloomberg Buyside Enterprise Solutions Bloomberg Analytics API — Scenario Analysis business capability. Self-contained,
      no shared references.
    resources:
    - name: v1-scenarios-analyze
      path: /v1/scenarios/analyze
      operations:
      - name: analyzescenario
        method: POST
        description: Bloomberg Buyside Enterprise Solutions Run scenario analysis
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.BLOOMBERG_BUYSIDE_ENTERPRISE_SOLUTIONS_API_KEY}}'
  exposes:
  - type: rest
    namespace: bloomberg-buyside-analytics-scenario-analysis-rest
    port: 8080
    description: REST adapter for Bloomberg Buyside Enterprise Solutions Bloomberg Analytics API — Scenario Analysis. One
      Spectral-compliant resource per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/v1/scenarios/analyze
      name: v1-scenarios-analyze
      description: REST surface for v1-scenarios-analyze.
      operations:
      - method: POST
        name: analyzescenario
        description: Bloomberg Buyside Enterprise Solutions Run scenario analysis
        call: bloomberg-buyside-analytics-scenario-analysis.analyzescenario
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: bloomberg-buyside-analytics-scenario-analysis-mcp
    port: 9090
    transport: http
    description: MCP adapter for Bloomberg Buyside Enterprise Solutions Bloomberg Analytics API — Scenario Analysis. One tool
      per consumed operation, routed inline through this capability's consumes block.
    tools:
    - name: bloomberg-buyside-enterprise-solutions-run
      description: Bloomberg Buyside Enterprise Solutions Run scenario analysis
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: bloomberg-buyside-analytics-scenario-analysis.analyzescenario
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
