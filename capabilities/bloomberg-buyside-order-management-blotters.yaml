naftiko: 1.0.0-alpha2
info:
  label: Bloomberg Buyside Enterprise Solutions Bloomberg Order Management API — Blotters
  description: 'Bloomberg Buyside Enterprise Solutions Bloomberg Order Management API — Blotters. 1 operations. Lead operation:
    Bloomberg Buyside Enterprise Solutions Get trading blotter. Self-contained Naftiko capability covering one Bloomberg Buyside
    Enterprise Solutions business surface.'
  tags:
  - Bloomberg Buyside Enterprise Solutions
  - Blotters
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    BLOOMBERG_BUYSIDE_ENTERPRISE_SOLUTIONS_API_KEY: BLOOMBERG_BUYSIDE_ENTERPRISE_SOLUTIONS_API_KEY
capability:
  consumes:
  - type: http
    namespace: bloomberg-buyside-order-management-blotters
    baseUri: https://api.bloomberg.com/oms
    description: Bloomberg Buyside Enterprise Solutions Bloomberg Order Management API — Blotters business capability. Self-contained,
      no shared references.
    resources:
    - name: v1-blotter
      path: /v1/blotter
      operations:
      - name: getblotter
        method: GET
        description: Bloomberg Buyside Enterprise Solutions Get trading blotter
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: date
          in: query
          type: string
          description: Blotter date (defaults to current trading day)
        - name: status
          in: query
          type: string
          description: Filter by order status
        - name: portfolioId
          in: query
          type: string
          description: Filter by portfolio
    authentication:
      type: bearer
      token: '{{env.BLOOMBERG_BUYSIDE_ENTERPRISE_SOLUTIONS_API_KEY}}'
  exposes:
  - type: rest
    namespace: bloomberg-buyside-order-management-blotters-rest
    port: 8080
    description: REST adapter for Bloomberg Buyside Enterprise Solutions Bloomberg Order Management API — Blotters. One Spectral-compliant
      resource per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/v1/blotter
      name: v1-blotter
      description: REST surface for v1-blotter.
      operations:
      - method: GET
        name: getblotter
        description: Bloomberg Buyside Enterprise Solutions Get trading blotter
        call: bloomberg-buyside-order-management-blotters.getblotter
        with:
          date: rest.date
          status: rest.status
          portfolioId: rest.portfolioId
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: bloomberg-buyside-order-management-blotters-mcp
    port: 9090
    transport: http
    description: MCP adapter for Bloomberg Buyside Enterprise Solutions Bloomberg Order Management API — Blotters. One tool
      per consumed operation, routed inline through this capability's consumes block.
    tools:
    - name: bloomberg-buyside-enterprise-solutions-get
      description: Bloomberg Buyside Enterprise Solutions Get trading blotter
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: bloomberg-buyside-order-management-blotters.getblotter
      with:
        date: tools.date
        status: tools.status
        portfolioId: tools.portfolioId
      outputParameters:
      - type: object
        mapping: $.
