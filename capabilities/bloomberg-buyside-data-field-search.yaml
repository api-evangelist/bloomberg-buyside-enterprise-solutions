naftiko: 1.0.0-alpha2
info:
  label: Bloomberg Buyside Enterprise Solutions Bloomberg Data API — Field Search
  description: 'Bloomberg Buyside Enterprise Solutions Bloomberg Data API — Field Search. 1 operations. Lead operation: Bloomberg
    Buyside Enterprise Solutions Search available data fields. Self-contained Naftiko capability covering one Bloomberg Buyside
    Enterprise Solutions business surface.'
  tags:
  - Bloomberg Buyside Enterprise Solutions
  - Field Search
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    BLOOMBERG_BUYSIDE_ENTERPRISE_SOLUTIONS_API_KEY: BLOOMBERG_BUYSIDE_ENTERPRISE_SOLUTIONS_API_KEY
capability:
  consumes:
  - type: http
    namespace: bloomberg-buyside-data-field-search
    baseUri: https://api.bloomberg.com
    description: Bloomberg Buyside Enterprise Solutions Bloomberg Data API — Field Search business capability. Self-contained,
      no shared references.
    resources:
    - name: data-v1-fields
      path: /data/v1/fields
      operations:
      - name: searchfields
        method: GET
        description: Bloomberg Buyside Enterprise Solutions Search available data fields
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: query
          in: query
          type: string
          description: Search keyword or field mnemonic
          required: true
        - name: category
          in: query
          type: string
          description: Filter by field category
        - name: limit
          in: query
          type: integer
          description: Maximum number of results to return
        - name: offset
          in: query
          type: integer
          description: Number of results to skip for pagination
    authentication:
      type: bearer
      token: '{{env.BLOOMBERG_BUYSIDE_ENTERPRISE_SOLUTIONS_API_KEY}}'
  exposes:
  - type: rest
    namespace: bloomberg-buyside-data-field-search-rest
    port: 8080
    description: REST adapter for Bloomberg Buyside Enterprise Solutions Bloomberg Data API — Field Search. One Spectral-compliant
      resource per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/data/v1/fields
      name: data-v1-fields
      description: REST surface for data-v1-fields.
      operations:
      - method: GET
        name: searchfields
        description: Bloomberg Buyside Enterprise Solutions Search available data fields
        call: bloomberg-buyside-data-field-search.searchfields
        with:
          query: rest.query
          category: rest.category
          limit: rest.limit
          offset: rest.offset
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: bloomberg-buyside-data-field-search-mcp
    port: 9090
    transport: http
    description: MCP adapter for Bloomberg Buyside Enterprise Solutions Bloomberg Data API — Field Search. One tool per consumed
      operation, routed inline through this capability's consumes block.
    tools:
    - name: bloomberg-buyside-enterprise-solutions-search
      description: Bloomberg Buyside Enterprise Solutions Search available data fields
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: bloomberg-buyside-data-field-search.searchfields
      with:
        query: tools.query
        category: tools.category
        limit: tools.limit
        offset: tools.offset
      outputParameters:
      - type: object
        mapping: $.
