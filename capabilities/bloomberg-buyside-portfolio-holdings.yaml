naftiko: 1.0.0-alpha2
info:
  label: Bloomberg Buyside Enterprise Solutions Bloomberg Portfolio API — Holdings
  description: 'Bloomberg Buyside Enterprise Solutions Bloomberg Portfolio API — Holdings. 2 operations. Lead operation: Bloomberg
    Buyside Enterprise Solutions Get portfolio holdings. Self-contained Naftiko capability covering one Bloomberg Buyside
    Enterprise Solutions business surface.'
  tags:
  - Bloomberg Buyside Enterprise Solutions
  - Holdings
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    BLOOMBERG_BUYSIDE_ENTERPRISE_SOLUTIONS_API_KEY: BLOOMBERG_BUYSIDE_ENTERPRISE_SOLUTIONS_API_KEY
capability:
  consumes:
  - type: http
    namespace: bloomberg-buyside-portfolio-holdings
    baseUri: https://api.bloomberg.com/portfolio
    description: Bloomberg Buyside Enterprise Solutions Bloomberg Portfolio API — Holdings business capability. Self-contained,
      no shared references.
    resources:
    - name: v1-portfolios-portfolioId-holdings
      path: /v1/portfolios/{portfolioId}/holdings
      operations:
      - name: getportfolioholdings
        method: GET
        description: Bloomberg Buyside Enterprise Solutions Get portfolio holdings
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: asOfDate
          in: query
          type: string
          description: Holdings as of this date (defaults to current date)
        - name: includeAnalytics
          in: query
          type: boolean
          description: Include analytics fields for each holding
      - name: updateportfolioholdings
        method: PUT
        description: Bloomberg Buyside Enterprise Solutions Update portfolio holdings
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.BLOOMBERG_BUYSIDE_ENTERPRISE_SOLUTIONS_API_KEY}}'
  exposes:
  - type: rest
    namespace: bloomberg-buyside-portfolio-holdings-rest
    port: 8080
    description: REST adapter for Bloomberg Buyside Enterprise Solutions Bloomberg Portfolio API — Holdings. One Spectral-compliant
      resource per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/v1/portfolios/{portfolioid}/holdings
      name: v1-portfolios-portfolioid-holdings
      description: REST surface for v1-portfolios-portfolioId-holdings.
      operations:
      - method: GET
        name: getportfolioholdings
        description: Bloomberg Buyside Enterprise Solutions Get portfolio holdings
        call: bloomberg-buyside-portfolio-holdings.getportfolioholdings
        with:
          asOfDate: rest.asOfDate
          includeAnalytics: rest.includeAnalytics
        outputParameters:
        - type: object
          mapping: $.
      - method: PUT
        name: updateportfolioholdings
        description: Bloomberg Buyside Enterprise Solutions Update portfolio holdings
        call: bloomberg-buyside-portfolio-holdings.updateportfolioholdings
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: bloomberg-buyside-portfolio-holdings-mcp
    port: 9090
    transport: http
    description: MCP adapter for Bloomberg Buyside Enterprise Solutions Bloomberg Portfolio API — Holdings. One tool per consumed
      operation, routed inline through this capability's consumes block.
    tools:
    - name: bloomberg-buyside-enterprise-solutions-get
      description: Bloomberg Buyside Enterprise Solutions Get portfolio holdings
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: bloomberg-buyside-portfolio-holdings.getportfolioholdings
      with:
        asOfDate: tools.asOfDate
        includeAnalytics: tools.includeAnalytics
      outputParameters:
      - type: object
        mapping: $.
    - name: bloomberg-buyside-enterprise-solutions-update
      description: Bloomberg Buyside Enterprise Solutions Update portfolio holdings
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: bloomberg-buyside-portfolio-holdings.updateportfolioholdings
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
