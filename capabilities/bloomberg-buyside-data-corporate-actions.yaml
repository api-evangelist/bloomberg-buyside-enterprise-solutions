naftiko: 1.0.0-alpha2
info:
  label: Bloomberg Buyside Enterprise Solutions Bloomberg Data API — Corporate Actions
  description: 'Bloomberg Buyside Enterprise Solutions Bloomberg Data API — Corporate Actions. 1 operations. Lead operation:
    Bloomberg Buyside Enterprise Solutions Get corporate actions for securities. Self-contained Naftiko capability covering
    one Bloomberg Buyside Enterprise Solutions business surface.'
  tags:
  - Bloomberg Buyside Enterprise Solutions
  - Corporate Actions
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    BLOOMBERG_BUYSIDE_ENTERPRISE_SOLUTIONS_API_KEY: BLOOMBERG_BUYSIDE_ENTERPRISE_SOLUTIONS_API_KEY
capability:
  consumes:
  - type: http
    namespace: bloomberg-buyside-data-corporate-actions
    baseUri: https://api.bloomberg.com
    description: Bloomberg Buyside Enterprise Solutions Bloomberg Data API — Corporate Actions business capability. Self-contained,
      no shared references.
    resources:
    - name: data-v1-corporate-actions
      path: /data/v1/corporate-actions
      operations:
      - name: getcorporateactions
        method: POST
        description: Bloomberg Buyside Enterprise Solutions Get corporate actions for securities
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.BLOOMBERG_BUYSIDE_ENTERPRISE_SOLUTIONS_API_KEY}}'
  exposes:
  - type: rest
    namespace: bloomberg-buyside-data-corporate-actions-rest
    port: 8080
    description: REST adapter for Bloomberg Buyside Enterprise Solutions Bloomberg Data API — Corporate Actions. One Spectral-compliant
      resource per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/data/v1/corporate-actions
      name: data-v1-corporate-actions
      description: REST surface for data-v1-corporate-actions.
      operations:
      - method: POST
        name: getcorporateactions
        description: Bloomberg Buyside Enterprise Solutions Get corporate actions for securities
        call: bloomberg-buyside-data-corporate-actions.getcorporateactions
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: bloomberg-buyside-data-corporate-actions-mcp
    port: 9090
    transport: http
    description: MCP adapter for Bloomberg Buyside Enterprise Solutions Bloomberg Data API — Corporate Actions. One tool per
      consumed operation, routed inline through this capability's consumes block.
    tools:
    - name: bloomberg-buyside-enterprise-solutions-get
      description: Bloomberg Buyside Enterprise Solutions Get corporate actions for securities
      hints:
        readOnly: true
        destructive: false
        idempotent: false
      call: bloomberg-buyside-data-corporate-actions.getcorporateactions
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
