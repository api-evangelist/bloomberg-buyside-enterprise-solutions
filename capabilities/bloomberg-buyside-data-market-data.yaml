naftiko: 1.0.0-alpha2
info:
  label: Bloomberg Buyside Enterprise Solutions Bloomberg Data API — Market Data
  description: 'Bloomberg Buyside Enterprise Solutions Bloomberg Data API — Market Data. 1 operations. Lead operation: Bloomberg
    Buyside Enterprise Solutions Get market data snapshot. Self-contained Naftiko capability covering one Bloomberg Buyside
    Enterprise Solutions business surface.'
  tags:
  - Bloomberg Buyside Enterprise Solutions
  - Market Data
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    BLOOMBERG_BUYSIDE_ENTERPRISE_SOLUTIONS_API_KEY: BLOOMBERG_BUYSIDE_ENTERPRISE_SOLUTIONS_API_KEY
capability:
  consumes:
  - type: http
    namespace: bloomberg-buyside-data-market-data
    baseUri: https://api.bloomberg.com
    description: Bloomberg Buyside Enterprise Solutions Bloomberg Data API — Market Data business capability. Self-contained,
      no shared references.
    resources:
    - name: data-v1-market
      path: /data/v1/market
      operations:
      - name: getmarketdata
        method: POST
        description: Bloomberg Buyside Enterprise Solutions Get market data snapshot
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.BLOOMBERG_BUYSIDE_ENTERPRISE_SOLUTIONS_API_KEY}}'
  exposes:
  - type: rest
    namespace: bloomberg-buyside-data-market-data-rest
    port: 8080
    description: REST adapter for Bloomberg Buyside Enterprise Solutions Bloomberg Data API — Market Data. One Spectral-compliant
      resource per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/data/v1/market
      name: data-v1-market
      description: REST surface for data-v1-market.
      operations:
      - method: POST
        name: getmarketdata
        description: Bloomberg Buyside Enterprise Solutions Get market data snapshot
        call: bloomberg-buyside-data-market-data.getmarketdata
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: bloomberg-buyside-data-market-data-mcp
    port: 9090
    transport: http
    description: MCP adapter for Bloomberg Buyside Enterprise Solutions Bloomberg Data API — Market Data. One tool per consumed
      operation, routed inline through this capability's consumes block.
    tools:
    - name: bloomberg-buyside-enterprise-solutions-get
      description: Bloomberg Buyside Enterprise Solutions Get market data snapshot
      hints:
        readOnly: true
        destructive: false
        idempotent: false
      call: bloomberg-buyside-data-market-data.getmarketdata
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
